x-common-env: &common-env
  DATABASE_URL: postgresql://autobook:autobook@db:5432/autobook
  REDIS_URL: redis://redis:6379/0
  AWS_PROFILE: ${AWS_PROFILE:-default}
  AWS_DEFAULT_REGION: ca-central-1
  ENV: local
  AUTH_ENABLED: "false"

x-common: &common
  depends_on:
    - db
    - redis
  volumes:
    - ~/.aws:/home/app/.aws:ro

services:
  # ── Infrastructure ──────────────────────────────────────────
  db:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: autobook
      POSTGRES_PASSWORD: autobook
      POSTGRES_DB: autobook
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  cloudbeaver:
    image: dbeaver/cloudbeaver
    ports:
      - "8978:8978"

  elasticmq:
    image: softwaremill/elasticmq
    ports:
      - "9324:9324"
      - "9325:9325"

  # ── Application Services ────────────────────────────────────
  api:
    build: { context: ., target: autobook-api }
    <<: *common
    ports:
      - "8000:8000"
    environment:
      <<: *common-env

  normalizer:
    build: { context: ., target: autobook-normalizer }
    <<: *common
    environment:
      <<: *common-env

  precedent:
    build: { context: ., target: autobook-precedent }
    <<: *common
    environment:
      <<: *common-env

  ml-inference:
    build: { context: ., target: autobook-ml-inference }
    <<: *common
    environment:
      <<: *common-env

  agent:
    build: { context: ., target: autobook-agent }
    <<: *common
    environment:
      <<: *common-env

  resolution:
    build: { context: ., target: autobook-resolution }
    <<: *common
    environment:
      <<: *common-env

  posting:
    build: { context: ., target: autobook-posting }
    <<: *common
    environment:
      <<: *common-env

  flywheel:
    build: { context: ., target: autobook-flywheel }
    <<: *common
    environment:
      <<: *common-env

volumes:
  pgdata:
