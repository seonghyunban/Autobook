experiment_name: autobook_deberta_v3
base_model: microsoft/deberta-v3-small
train_path: ml_workspace/data/processed_dedup/train.jsonl
validation_path: ml_workspace/data/processed_dedup/validation.jsonl
test_path: ml_workspace/data/processed_dedup/test.jsonl
output_subdir: autobook_deberta_v3
gpu: A100-80GB
timeout_hours: 6
report_to_wandb: true
wandb_project: 490-autobook-ml

sequence:
  enabled: true
  num_train_epochs: 3.0
  learning_rate: 1.0e-5
  warmup_ratio: 0.1
  train_batch_size: 4
  eval_batch_size: 4
  max_grad_norm: 1.0
  max_length: 256
  run_prefix: autobook-seq-v1

entity:
  enabled: true
  num_train_epochs: 4.0
  learning_rate: 1.0e-5
  warmup_ratio: 0.1
  train_batch_size: 4
  eval_batch_size: 4
  max_grad_norm: 1.0
  max_length: 256
  run_name: autobook-ner-v1

evaluation:
  enabled: true
  output_subdir: evaluation
