experiment_name: autobook_deberta_smoke
base_model: microsoft/deberta-v3-small
train_path: ml_workspace/data/processed/train.jsonl
validation_path: ml_workspace/data/processed/validation.jsonl
output_subdir: autobook_deberta_smoke
gpu: A10G
timeout_hours: 4
report_to_wandb: false
wandb_project: 490-autobook-ml

sequence:
  enabled: true
  num_train_epochs: 1.0
  learning_rate: 5.0e-5
  train_batch_size: 4
  eval_batch_size: 4
  max_length: 256
  run_prefix: autobook-seq-smoke

entity:
  enabled: true
  num_train_epochs: 1.0
  learning_rate: 5.0e-5
  train_batch_size: 4
  eval_batch_size: 4
  max_length: 256
  run_name: autobook-ner-smoke
