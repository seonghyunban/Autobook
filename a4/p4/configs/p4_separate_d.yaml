# P4 Separate D: Original + Reward D (post-P3)
#
# PLACEHOLDER — reward_d must be implemented before running (step 7.5).
#
# Run:
#   modal run --detach a4/shared/scripts/main.py --config a4/p4/configs/p4_separate_d.yaml

experiment_name: p4-separate-d
nanochat_ref: p4
gpu: H100
timeout_hours: 6
data_shards: 1
data_workers: 1

train:
  - name: train
    args:
      script: scripts.chat_rl
      model_tag: p4-separate-d
      model_step: 24633
      run: p4-separate-d
      rewards:
        - correctness
        - reward_d
      init_from_source: sft
      init_from_tag: a4p2-sft-metamath-swiglu
      init_from_step: 24633

eval:
  - checkpoint: p4-separate-d
    after_stage: train
    evals: [custom]
    custom_eval: p4/evals/gsm8k_eval_rl.py
