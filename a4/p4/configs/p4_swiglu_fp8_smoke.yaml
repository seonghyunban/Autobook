experiment_name: p4-swiglu-fp8-smoke
nanochat_ref: p4-final-baseline
gpu: H100
timeout_hours: 1

train:
  - name: train
    args:
      depth: 20
      max_seq_len: 512
      num_iterations: 20
      model_tag: nano-swiglu-fp8-smoke
      device_batch_size: 16
      total_batch_size: 65536
      eval_every: -1
      save_every: 30
      core_metric_every: -1
      sample_every: -1
      run: p4-swiglu-fp8-smoke
      window_pattern: L
      mlp_variant: swiglu
      residual_variant: standard
      fp8: true
      fp8_recipe: tensorwise

eval:
  - checkpoint: nano-swiglu-fp8-smoke
    after_stage: train
    evals: [bpb, core]
    max_per_task: 32
