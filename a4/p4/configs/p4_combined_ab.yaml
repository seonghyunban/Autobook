# P4 Combined AB: Original + Format Compliance + Numeric Proximity
#
# Run:
#   modal run --detach a4/shared/scripts/main.py --config a4/p4/configs/p4_combined_ab.yaml

experiment_name: p4-combined-ab
nanochat_ref: a4-p4
gpu: "H100:8"
timeout_hours: 8
data_shards: 1
data_workers: 1

train:
  - name: train
    args:
      script: scripts.chat_rl
      nproc: 8
      model_tag: p4-combined-ab
      model_step: 24633
      run: p4-combined-ab
      rewards:
        - correctness
        - format_compliance
        - numeric_proximity
      init_from_source: sft
      init_from_tag: a4p2-sft-metamath-swiglu
      init_from_step: 24633

eval:
  - checkpoint: p4-combined-ab
    after_stage: train
    evals: [custom]
    custom_eval: p4/evals/gsm8k_eval_rl.py
    num_eval_shards: 8
