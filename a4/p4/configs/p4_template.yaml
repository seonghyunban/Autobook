# P4 Template - train full nanochat
#
# Copy this file, fill in the values, push your branch to the fork, then run:
#   modal run --detach a3/shared/scripts/main.py --config a3/p4/configs/p4_your_config.yaml
#
# Remember: push your branch to the fork BEFORE running. Modal pulls from GitHub, not your laptop.

experiment_name: p4-final
nanochat_ref: p4-final-baseline
gpu: H100
timeout_hours: 24
data_shards: -1
data_workers: 8

train:
  - name: train
    args:
      depth: 20
      max_seq_len: 512
      num_iterations: 4357
      model_tag: nano-template
      device_batch_size: 32
      total_batch_size: 1048576
      eval_every: -1
      save_every: 200
      core_metric_every: -1
      sample_every: -1
      run: p4-final
      window_pattern: L
      mlp_variant: relu2
      residual_variant: standard
      fp8: true
      fp8_recipe: tensorwise

eval:
  - checkpoint: nano-template
    after_stage: train
    evals: [bpb, core]
