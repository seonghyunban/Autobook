# Collect config — specifies which runs to pull eval results and W&B metrics for.
#
# Usage:
#   python -m a4.p4.scripts.collect --config a4/p4/configs/collect.yaml
#   python -m a4.p4.scripts.collect --config a4/p4/configs/collect.yaml --eval-only

output_dir: a4/p4/results/collected
volume_name: a3-checkpoints
wandb_project: 490-autobook-a4

runs:
  - name: baseline
    checkpoint_tag: p4-baseline
    eval_step: 466
    wandb_run_id: TBD
    num_eval_shards: 8

  - name: separate_a
    checkpoint_tag: p4-separate-a
    eval_step: 466
    wandb_run_id: TBD
    num_eval_shards: 8

  - name: separate_b
    checkpoint_tag: p4-separate-b
    eval_step: 466
    wandb_run_id: TBD
    num_eval_shards: 8

  - name: combined_ab
    checkpoint_tag: p4-combined-ab
    eval_step: 466
    wandb_run_id: TBD
    num_eval_shards: 8
