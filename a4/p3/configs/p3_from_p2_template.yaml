experiment_name: p3-from-p2          # W&B group name + results folder name
nanochat_ref: p2                     # P2's branch in the nanochat fork

modal:
  gpu: A100                           # "T4", "A10G", "A100", "H100"
  timeout_hours: 2                   # max wall time before Modal kills the run

train:
  - name: short-context
    args:                            # maps directly to nanochat CLI args
      depth: TBD                     # P2's depth — get from teammate
      max_seq_len: 512               # reduced sequence length for stage 1 — PLACEHOLDER
      num_iterations: 1000           # iterations for short-context training — PLACEHOLDER
      model_tag: pico-p2-short       # checkpoint folder name (distinct from baseline)
      save_every: 500                # checkpoint interval
      run: p3-from-p2-short          # W&B run name

  - name: extended-context
    args:
      depth: TBD                     # must match stage 1 — get from teammate
      max_seq_len: 2048              # extended sequence length for stage 2
      num_iterations: 1500           # PLACEHOLDER — depends on --num-iterations semantics (Phase 2)
      model_tag: pico-p2-short       # same tag — checkpoints coexist by step number
      resume_from_step: 1000         # resume from end of stage 1 — PLACEHOLDER
      save_every: 500
      run: p3-from-p2-extended       # W&B run name

eval:
  - checkpoint: pico-p2-short         # model_tag to evaluate
    step: 1000                       # stage 1 checkpoint — PLACEHOLDER
    custom_eval: p3/evals/context_length_eval.py

  - checkpoint: pico-p2-short
    step: 1500                       # stage 2 checkpoint — PLACEHOLDER
    custom_eval: p3/evals/context_length_eval.py
