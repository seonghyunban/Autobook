experiment_name: p3-baseline-eval-only
nanochat_ref: baseline-v0

train: []

eval:
  - checkpoint: pico-short
    step: 1433
    evals: [bpb, custom]               # no CORE — seq_len=512 can't handle long CORE prompts
    custom_eval: p3/evals/context_length_eval.py

  - checkpoint: pico-short
    step: 1933
    evals: [bpb, core, custom]
    custom_eval: p3/evals/context_length_eval.py

  - checkpoint: pico-full
    step: 1433
    evals: [bpb, core, custom]
    custom_eval: p3/evals/context_length_eval.py
