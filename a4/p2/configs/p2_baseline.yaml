experiment_name: p2-baseline
nanochat_ref: baseline-v0
gpu: A100-80GB

train:
  - name: train
    args:
      depth: 6
      max_seq_len: 512
      num_iterations: 1433
      model_tag: pico-baseline
      device_batch_size: 128
      total_batch_size: 262144
      eval_every: -1
      save_every: 100
      core_metric_every: -1
      sample_every: -1
      run: p2-baseline
      window_pattern: L

eval:
  - checkpoint: pico-baseline
    after_stage: train
    evals: [bpb]
