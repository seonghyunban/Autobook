experiment_name: a4p2-sft-altmix
nanochat_ref: a4-p2
gpu: H100
timeout_hours: 24
data_shards: -1
data_workers: 8

train:
  - name: sft_altmix
    args:
      script: scripts.chat_sft
      init_from_source: base
      init_from_tag: nano-swiglu-fp8-full
      init_from_step: 4357
      model_tag: a4p2-sft-altmix-swiglu
      model_step: 4357
      load_optimizer: 1
      num_iterations: -1
      # Same SFT recipe, different supervision mix weights.
      mmlu_epochs: 5
      gsm8k_epochs: 8
      run: a4p2-sft-altmix

eval:
  - checkpoint: a4p2-sft-altmix-swiglu
    after_stage: sft_altmix
    evals: [custom]
    custom_eval: p2/evals/gsm8k_eval_sft.py
