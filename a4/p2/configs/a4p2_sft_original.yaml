experiment_name: a4p2-sft-original
nanochat_ref: p4-final-baseline
gpu: H100
timeout_hours: 24
data_shards: -1
data_workers: 8

train:
  - name: sft_original
    args:
      script: scripts.chat_sft
      init_from_source: base
      init_from_tag: nano-baseline-fp8-full
      init_from_step: 4357
      model_tag: a4p2-sft-orig-base
      model_step: 4357
      load_optimizer: 1
      num_iterations: -1
      run: a4p2-sft-original

eval:
  - checkpoint: a4p2-sft-orig-base
    after_stage: sft_original
    evals: [custom]
    custom_eval: p2/evals/gsm8k_eval_sft.py

