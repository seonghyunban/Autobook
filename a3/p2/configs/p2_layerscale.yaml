experiment_name: p2-layerscale
nanochat_ref: p2-swiglu-layerscale
gpu: A100-80GB

train:
  - name: train
    args:
      depth: 6
      max_seq_len: 512
      num_iterations: 1433
      resume_from_step: 1200
      model_tag: pico-layerscale
      device_batch_size: 128
      total_batch_size: 262144
      eval_every: -1
      save_every: 100
      core_metric_every: -1
      sample_every: -1
      run: p2-layerscale
      window_pattern: L
      mlp_variant: relu2
      residual_variant: layerscale
      layerscale_init: 1.0e-4

eval:
  - checkpoint: pico-layerscale
    after_stage: train
    evals: [bpb]
