experiment_name: p2-swiglu-layerscale-smoke
nanochat_ref: p2-swiglu-layerscale
gpu: A100-80GB
timeout_hours: 1

train:
  - name: train
    args:
      depth: 6
      max_seq_len: 512
      num_iterations: 20
      model_tag: pico-swiglu-layerscale-smoke
      device_batch_size: 128
      total_batch_size: 262144
      eval_every: -1
      save_every: 20
      core_metric_every: -1
      sample_every: -1
      run: dummy
      window_pattern: L
      mlp_variant: swiglu
      residual_variant: layerscale
      layerscale_init: 1.0e-4

eval:
  - checkpoint: pico-swiglu-layerscale-smoke
    after_stage: train
    evals: [bpb]
