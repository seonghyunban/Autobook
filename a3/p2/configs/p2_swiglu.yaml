experiment_name: p2-swiglu
nanochat_ref: p2-swiglu-layerscale
gpu: A100-80GB

train:
  - name: train
    args:
      depth: 6
      max_seq_len: 512
      num_iterations: 1433
      resume_from_step: 700
      model_tag: pico-swiglu
      device_batch_size: 128
      total_batch_size: 262144
      eval_every: -1
      save_every: 100
      core_metric_every: -1
      sample_every: -1
      run: p2-swiglu
      window_pattern: L
      mlp_variant: swiglu
      residual_variant: standard

eval:
  - checkpoint: pico-swiglu
    after_stage: train
    evals: [bpb]
