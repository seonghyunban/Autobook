experiment_name: p4-pipeline-smoke-20min
nanochat_ref: p4-final-baseline
gpu: H100
timeout_hours: 1

# Quick smoke only: small data slice + short train to verify end-to-end stability.
data_shards: 2
data_workers: 4

train:
  - name: train
    args:
      depth: 20
      max_seq_len: 512
      num_iterations: 20
      model_tag: nano-baseline-fp8-smoke20
      device_batch_size: 16
      total_batch_size: 65536
      eval_every: -1
      save_every: 20
      core_metric_every: -1
      sample_every: -1
      run: p4-pipeline-smoke-20min
      window_pattern: L
      mlp_variant: relu2
      residual_variant: standard
      fp8: true
      fp8_recipe: tensorwise

eval:
  - checkpoint: nano-baseline-fp8-smoke20
    after_stage: train
    evals: [bpb, core]
    max_per_task: 32
