# Smoke test — eval-only mode: no training, just evaluate existing checkpoints.
# Requires pico-short checkpoint on the Modal Volume (from P3 runs).
# Only evals pico-short (seq_len=512) — pico-full (seq_len=2048) OOMs on A10G.
# Takes ~1-2 min.
#
#   modal run a3/shared/scripts/main.py --config a3/shared/configs/smoke_test_eval_only.yaml

experiment_name: smoke-eval-only
nanochat_ref: baseline-v0
gpu: A10G
timeout_hours: 1

train: []

eval:
  - checkpoint: pico-short
    step: 1433
    evals: [bpb]
