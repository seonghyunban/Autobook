# Smoke test — train-only mode: no evaluation.
# Tests that the pipeline handles eval: [] without errors.
# Takes ~1 min.
#
#   modal run a3/shared/scripts/main.py --config a3/shared/configs/smoke_test_train_only.yaml

experiment_name: smoke-train-only
nanochat_ref: baseline-v0
gpu: A10G
timeout_hours: 1

train:
  - name: train
    args:
      depth: 6
      max_seq_len: 512
      model_tag: smoke-train-only
      device_batch_size: 32
      total_batch_size: 16384
      num_iterations: 3
      save_every: 3
      eval_every: -1
      core_metric_every: -1
      sample_every: -1
      run: dummy

eval: []
